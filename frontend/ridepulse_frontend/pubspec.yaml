name: ridepulse_frontend
description: "Ride Pulse - Smart Digital Ticketing & Transport Intelligence System"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.2

  # HTTP Clients
  dio: ^5.4.0
  http: ^1.2.0

  # State Management
  provider: ^6.1.1

  # Secure Storage (JWT)
  flutter_secure_storage: ^9.0.0

  # JSON Serialization
  json_annotation: ^4.8.1

  # Routing
  go_router: ^13.0.0

  # Loading indicators
  flutter_spinkit: ^5.2.0

  # Toast messages
  fluttertoast: ^8.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.4.7
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true